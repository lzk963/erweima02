<!DOCTYPE html>
<!-- 网页语言：中文 -->
<html lang="zh-CN">

<head>
    <!-- 字符编码，防止乱码 -->
    <meta charset="UTF-8">
    <!-- 适配手机端 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- 网页标题（浏览器标签显示） -->
    <title>我的第一个网页</title>
    <style>
        /* 简单样式：让页面更好看 */
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            text-align: center;
            background-color: #f5f5f5;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background: #42b983;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <!-- 一级标题 -->
    <h1>你好，这是我的第一个 HTML 网页</h1>

    <!-- 普通段落 -->
    <p>这是一个用纯 HTML + CSS 写的简单网页</p>

    <!-- 图片（替换链接即可使用） -->
    <img src="https://picsum.photos/400/200" alt="示例图片" width="400">

    <br><br>

    <!-- 超链接 -->
    <a href="https://www.baidu.com" target="_blank">点击访问百度</a>

    <br><br>

    <!-- 按钮 -->
    <button onclick="alert('你点击了按钮！')">点我试试</button>
</body>

</html>
